# Animal Watch（林麝监测）业务配置
# 这是业务二的 Nginx 配置，需要复制到 VideoPPT 的 external-conf.d 目录

# 上游服务器（海康互联后端）
upstream animalwatch_backend {
    server animalwatch:5000;
    keepalive 32;
}

# HTTP服务器配置
server {
    listen 80;
    server_name animalwatch.localhost;  # 可以使用不同的域名或路径
    
    # 访问日志
    access_log /var/log/nginx/animalwatch-access.log main;
    error_log /var/log/nginx/animalwatch-error.log;

    # 海康互联回调接口（需要暴露给公网）
    location /api/callback {
        proxy_pass http://animalwatch_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        
        # 支持大请求体
        client_max_body_size 50M;
    }

    # API接口
    location /api/ {
        proxy_pass http://animalwatch_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查
    location /health {
        proxy_pass http://animalwatch_backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # 主页
    location / {
        proxy_pass http://animalwatch_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
