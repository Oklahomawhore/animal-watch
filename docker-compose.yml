version: '3.8'

# 使用外部网络（VideoPPT 创建的网络）
networks:
  # 方式1: 如果 VideoPPT 在同一台机器上，使用外部网络
  videoppt-network:
    external: true
    name: videoppt_videoppt-network
  
  # 方式2: 独立的网络（用于本地开发测试）
  hikvision-network:
    driver: bridge

services:
  # 海康互联后端服务
  animalwatch:
    build: ./hikvision-backend
    container_name: animalwatch
    restart: unless-stopped
    # 端口映射（仅用于本地测试，生产环境通过 VideoPPT 的 Nginx 访问）
    ports:
      - "5001:5000"
    environment:
      - HIK_APP_KEY=${HIK_APP_KEY}
      - HIK_APP_SECRET=${HIK_APP_SECRET}
      - HIK_BASE_URL=${HIK_BASE_URL:-https://open-api.hikiot.com}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/hikvision.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
    volumes:
      - animalwatch-data:/app/data
      - ./admin-web:/app/admin-web:ro  # 挂载前端静态文件
    # 确保以 root 运行
    user: "root:root"
    depends_on:
      - redis
    networks:
      # 加入 VideoPPT 的网络（关键！让 Nginx 能访问到）
      - videoppt-network
      - hikvision-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: animalwatch-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - hikvision-network

volumes:
  redis-data:
  animalwatch-data:
