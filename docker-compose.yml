version: '3.8'

# 使用外部网络（VideoPPT 创建的网络）
networks:
  # 方式1: 如果 VideoPPT 在同一台机器上，使用外部网络
  videoppt-network:
    external: true
    name: videoppt_videoppt-network
  
  # 方式2: 独立的网络（用于本地开发测试）
  hikvision-network:
    driver: bridge

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: animalwatch-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=animalwatch
      - POSTGRES_PASSWORD=animalwatch123
      - POSTGRES_DB=animalwatch
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hikvision-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U animalwatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: animalwatch-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - hikvision-network

  # 海康互联后端服务
  animalwatch:
    build: ./hikvision-backend
    container_name: animalwatch
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - HIK_APP_KEY=${HIK_APP_KEY}
      - HIK_APP_SECRET=${HIK_APP_SECRET}
      - HIK_BASE_URL=${HIK_BASE_URL:-https://open-api.hikiot.com}
      - DATABASE_URL=${DATABASE_URL:-postgresql://animalwatch:animalwatch123@postgres:5432/animalwatch}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
    volumes:
      - ./admin-web:/app/admin-web:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - videoppt-network
      - hikvision-network

volumes:
  postgres-data:
  redis-data:
