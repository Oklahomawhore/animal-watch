version: '3.8'

services:
  # 海康互联后端服务
  hikvision-backend:
    build: ./hikvision-backend
    container_name: hikvision-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - HIK_APP_KEY=${HIK_APP_KEY}
      - HIK_APP_SECRET=${HIK_APP_SECRET}
      - HIK_BASE_URL=${HIK_BASE_URL:-https://open-api.hikiot.com}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/hikvision.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    networks:
      - hikvision-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: hikvision-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - hikvision-network

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: hikvision-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - hikvision-backend
    networks:
      - hikvision-network

volumes:
  redis-data:

networks:
  hikvision-network:
    driver: bridge
